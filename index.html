<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Tracker</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<header class="header">
<h1>Job Application Tracker</h1>
</header>


<section class="dashboard">

<div class="card">
<h3>Total</h3>
<p id="total-count">8</p>
</div>

<div class="card">
<h3>Interview</h3>
<p id="interview-count">0</p>
</div>

<div class="card">
<h3>Rejected</h3>
<p id="rejected-count">0</p>
</div>

</section>


<section class="jobs">

<div class="jobs-header">
<h3>Available Jobs</h3>
<p id="job-count">8 jobs</p>
</div>



<div class="tabs">

<button class="tab active" data-tab="all">All</button>

<button class="tab" data-tab="interview">Interview</button>

<button class="tab" data-tab="rejected">Rejected</button>

</div>




<div class="no-job" id="no-job">

<img src="jobs.png" alt="">

<h3>No Jobs Available</h3>

<p>No job found in this category</p>

</div>




<script src="script.js"></script>

</body>
</html>
